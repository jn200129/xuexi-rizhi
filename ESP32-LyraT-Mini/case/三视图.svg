<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" font-family="Consolas, 'Microsoft YaHei', sans-serif" font-size="11">
  <rect width="1100" height="720" fill="#ffffff"/>
  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">LyraT-Mini 桌面音箱外壳 · 三视图（单位 mm）</text>
  <text x="550" y="50" text-anchor="middle" font-size="12" fill="#64748b">外形 100 × 80 × 40 · 主体 U 型 + 顶盖 · 4 颗 M2×10 螺丝 · 材料 PLA / PETG</text>

  <!-- ============= 正视图 (Y=0 前面板) ============= -->
  <text x="90" y="80" font-size="13" font-weight="bold" fill="#1d4ed8">① 正视图（前面板 · 100 × 40）</text>
  <g transform="translate(90,90)">
    <rect x="0" y="0" width="400" height="160" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
    <!-- 屏窗口 30×34 位置 X=15..45, Z=4..38（图中 Y向下 = 屏顶到屏底: 40-38..40-4 = 2..36） -->
    <rect x="60" y="8" width="120" height="136" fill="#0f172a" stroke="#2563eb" stroke-width="1.5"/>
    <text x="120" y="80" text-anchor="middle" font-size="11" fill="#e2e8f0">屏窗口</text>
    <text x="120" y="98" text-anchor="middle" font-size="10" fill="#94a3b8">30 × 34</text>
    <!-- 喇叭孔 Ø36 中心 X=72, Z=20 → 图中(72*4, (40-20)*4)=(288, 80) -->
    <circle cx="288" cy="80" r="72" fill="none" stroke="#b03a3a" stroke-width="1.5"/>
    <text x="288" y="82" text-anchor="middle" font-size="11" fill="#b03a3a">喇叭 Ø36</text>
    <!-- 麦克风阵列 5 个小孔 中心 X=72, Z=36 → (288, 16) -->
    <g fill="#334155">
      <circle cx="264" cy="16" r="2.4"/>
      <circle cx="276" cy="16" r="2.4"/>
      <circle cx="288" cy="16" r="2.4"/>
      <circle cx="300" cy="16" r="2.4"/>
      <circle cx="312" cy="16" r="2.4"/>
    </g>
    <text x="360" y="18" font-size="10" fill="#64748b">麦克风 5×Ø1.2</text>
    <!-- 尺寸线 -->
    <g stroke="#94a3b8" stroke-width="0.5" fill="none">
      <line x1="0" y1="-10" x2="400" y2="-10"/>
      <line x1="0" y1="-14" x2="0" y2="-6"/>
      <line x1="400" y1="-14" x2="400" y2="-6"/>
      <line x1="-10" y1="0" x2="-10" y2="160"/>
      <line x1="-14" y1="0" x2="-6" y2="0"/>
      <line x1="-14" y1="160" x2="-6" y2="160"/>
      <!-- 屏尺寸 -->
      <line x1="60" y1="155" x2="60" y2="167"/>
      <line x1="180" y1="155" x2="180" y2="167"/>
      <line x1="60" y1="162" x2="180" y2="162"/>
    </g>
    <text x="200" y="-13" text-anchor="middle" fill="#64748b">100</text>
    <text x="-13" y="82" text-anchor="middle" fill="#64748b">40</text>
    <text x="120" y="174" text-anchor="middle" font-size="9" fill="#64748b">屏 30</text>
    <text x="15" y="177" font-size="9" fill="#64748b">屏左距: 15</text>
    <text x="245" y="177" font-size="9" fill="#64748b">喇叭中心 X=72</text>
    <!-- 分件线 -->
    <line x1="0" y1="10" x2="400" y2="10" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="4 3"/>
    <text x="405" y="12" font-size="9" fill="#b45309">↑ 顶盖分件线 Z=37.5</text>
  </g>

  <!-- ============= 俯视图 (Z=40 顶盖或去顶后的内视图) ============= -->
  <text x="610" y="80" font-size="13" font-weight="bold" fill="#1d4ed8">② 俯视图（去顶后·内部布局 · 100 × 80）</text>
  <g transform="translate(610,90)">
    <rect x="0" y="0" width="400" height="320" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
    <!-- 内腔 -->
    <rect x="9.6" y="9.6" width="380.8" height="300.8" fill="#eef2ff" stroke="#94a3b8" stroke-dasharray="3 2" stroke-width="0.6"/>
    <!-- 主板 65×55 中心 (50, 40) → 图中(200, 160) -->
    <rect x="130" y="90" width="260" height="220" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="260" y="105" text-anchor="middle" font-size="10" fill="#6d28d9">LyraT-Mini 主板 65×55</text>
    <!-- PCB 支撑柱 4 个 (18,25)(82,25)(18,55)(82,55) → 图中 (72,100)(328,100)(72,220)(328,220) -->
    <g fill="#16a34a">
      <circle cx="72" cy="100" r="10"/><circle cx="72" cy="100" r="4" fill="#f8fafc"/>
      <circle cx="328" cy="100" r="10"/><circle cx="328" cy="100" r="4" fill="#f8fafc"/>
      <circle cx="72" cy="220" r="10"/><circle cx="72" cy="220" r="4" fill="#f8fafc"/>
      <circle cx="328" cy="220" r="10"/><circle cx="328" cy="220" r="4" fill="#f8fafc"/>
    </g>
    <text x="60" y="130" font-size="9" fill="#15803d">PCB 柱 Ø5</text>
    <text x="335" y="130" font-size="9" fill="#15803d">M2 自攻</text>
    <!-- 顶盖螺柱 4 角 (6,6)(94,6)(6,74)(94,74) → (24,24)(376,24)(24,296)(376,296) -->
    <g fill="#d97706">
      <circle cx="24" cy="24" r="11"/><circle cx="24" cy="24" r="4" fill="#f8fafc"/>
      <circle cx="376" cy="24" r="11"/><circle cx="376" cy="24" r="4" fill="#f8fafc"/>
      <circle cx="24" cy="296" r="11"/><circle cx="24" cy="296" r="4" fill="#f8fafc"/>
      <circle cx="376" cy="296" r="11"/><circle cx="376" cy="296" r="4" fill="#f8fafc"/>
    </g>
    <text x="6" y="52" font-size="9" fill="#b45309">顶盖螺柱 Ø5.5</text>
    <!-- 喇叭 40mm 圆形俯视 -->
    <circle cx="288" cy="160" r="80" fill="none" stroke="#b03a3a" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="288" y="164" text-anchor="middle" font-size="10" fill="#b03a3a">喇叭 Ø40</text>
    <!-- 电池 55×35 -->
    <rect x="150" y="20" width="120" height="60" fill="none" stroke="#0284c7" stroke-width="1"/>
    <text x="210" y="55" text-anchor="middle" font-size="10" fill="#0369a1">电池 1500mAh</text>
    <!-- 前面板方向标注 -->
    <text x="200" y="-5" text-anchor="middle" font-size="10" fill="#334155">↓ 前面板（用户方向）</text>
    <text x="200" y="335" text-anchor="middle" font-size="10" fill="#334155">↑ 后面板</text>
    <!-- 尺寸 -->
    <g stroke="#94a3b8" stroke-width="0.5" fill="none">
      <line x1="-10" y1="0" x2="-10" y2="320"/>
      <line x1="-14" y1="0" x2="-6" y2="0"/>
      <line x1="-14" y1="320" x2="-6" y2="320"/>
    </g>
    <text x="-13" y="162" text-anchor="middle" fill="#64748b">80</text>
  </g>

  <!-- ============= 侧视图（左侧 X=0 面 · 80×40）============= -->
  <text x="90" y="290" font-size="13" font-weight="bold" fill="#1d4ed8">③ 侧视图 · 左侧（X=0 面 · 80 × 40）—— SD 卡口 / Micro-USB</text>
  <g transform="translate(90,300)">
    <rect x="0" y="0" width="320" height="160" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
    <!-- SD 中心 Y=22, Z=8 → 图中 (22*4=88, (40-8)*4=128) 长方形20×3 → 宽80 高12 -->
    <rect x="48" y="122" width="80" height="12" fill="#0f172a" stroke="#2563eb" stroke-width="1"/>
    <text x="88" y="143" text-anchor="middle" font-size="9" fill="#334155">MicroSD 20×3</text>
    <!-- USB 中心 Y=52, Z=8 → (208, 128) 长方形 8×4 → 宽32 高16 -->
    <rect x="192" y="120" width="32" height="16" fill="#0f172a" stroke="#2563eb" stroke-width="1"/>
    <text x="208" y="145" text-anchor="middle" font-size="9" fill="#334155">Micro-USB 8×4</text>
    <text x="150" y="80" text-anchor="middle" font-size="11" fill="#94a3b8">（此面朝左，SD 卡口与充电口）</text>
    <line x1="0" y1="10" x2="320" y2="10" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="4 3"/>
    <text x="325" y="12" font-size="9" fill="#b45309">↑ 顶盖分件线</text>
    <g stroke="#94a3b8" stroke-width="0.5" fill="none">
      <line x1="0" y1="-10" x2="320" y2="-10"/>
      <line x1="0" y1="-14" x2="0" y2="-6"/>
      <line x1="320" y1="-14" x2="320" y2="-6"/>
    </g>
    <text x="160" y="-13" text-anchor="middle" fill="#64748b">80（Y 方向）</text>
  </g>

  <!-- ============= 侧视图（右侧 X=100 面）============= -->
  <text x="610" y="450" font-size="13" font-weight="bold" fill="#1d4ed8">④ 侧视图 · 右侧（X=100 面 · 80 × 40）—— 6 键</text>
  <g transform="translate(610,460)">
    <rect x="0" y="0" width="320" height="160" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
    <!-- 6 键 Y=[12,24,36,48,60,72], Z=20 → 图中 X=[48,96,144,192,240,288], Y=80 -->
    <g fill="#0f172a" stroke="#2563eb" stroke-width="1">
      <circle cx="48"  cy="80" r="7"/>
      <circle cx="96"  cy="80" r="7"/>
      <circle cx="144" cy="80" r="7"/>
      <circle cx="192" cy="80" r="7"/>
      <circle cx="240" cy="80" r="7"/>
      <circle cx="288" cy="80" r="7"/>
    </g>
    <g font-size="9" fill="#334155" text-anchor="middle">
      <text x="48" y="102">Rec</text>
      <text x="96" y="102">Mode</text>
      <text x="144" y="102">Play</text>
      <text x="192" y="102">Set</text>
      <text x="240" y="102">Vol-</text>
      <text x="288" y="102">Vol+</text>
    </g>
    <text x="160" y="35" text-anchor="middle" font-size="11" fill="#94a3b8">6 键孔 Ø3.5，间距 12 mm</text>
    <line x1="0" y1="10" x2="320" y2="10" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="4 3"/>
    <text x="325" y="12" font-size="9" fill="#b45309">↑ 顶盖分件线</text>
    <g stroke="#94a3b8" stroke-width="0.5" fill="none">
      <line x1="0" y1="-10" x2="320" y2="-10"/>
      <line x1="0" y1="-14" x2="0" y2="-6"/>
      <line x1="320" y1="-14" x2="320" y2="-6"/>
    </g>
    <text x="160" y="-13" text-anchor="middle" fill="#64748b">80（Y 方向）</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(90,530)" font-size="11">
    <text x="0" y="0" font-weight="bold" fill="#1e293b">图例：</text>
    <circle cx="65" cy="-3" r="6" fill="#16a34a"/><text x="76" y="1" fill="#334155">PCB 支撑柱 Ø5（M2 自攻）</text>
    <circle cx="245" cy="-3" r="6" fill="#d97706"/><text x="256" y="1" fill="#334155">顶盖螺柱 Ø5.5（M2×10 拧顶盖）</text>
    <rect x="440" y="-9" width="14" height="12" fill="#0f172a"/><text x="460" y="1" fill="#334155">开口/开孔</text>
    <line x1="0" y1="25" x2="14" y2="25" stroke="#f59e0b" stroke-dasharray="4 3"/><text x="20" y="29" fill="#b45309">顶盖分件线（Z=37.5，顶盖 2.5 mm 厚）</text>
    <text x="0" y="55" fill="#334155">生成：D:\lyrat_mini_case\case_generator.py（改参数重跑，秒级出新 STL）</text>
  </g>

  <text x="550" y="700" text-anchor="middle" font-size="10" fill="#94a3b8">© 江楠 · 2026-07-03 · 参数化建模 by FreeCADCmd 1.1.1</text>
</svg>
